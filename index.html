<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kelime İstasyonu Evrensel PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="display" content="fullscreen">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Kelime%20Istasyonu%22%2C%22short_name%22%3A%22KelimeIst%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22fullscreen%22%7D">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            padding-top: calc(12px + env(safe-area-inset-top));
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; }
        
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h1 { font-size: 18px; margin: 0; color: #f8fafc; font-weight: 800; }
        
        .lang-selector {
            display: flex;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 2px;
        }
        .lang-btn {
            background: transparent; border: none; color: #94a3b8; 
            padding: 5px 12px; font-size: 11px; font-weight: bold; border-radius: 15px; cursor: pointer;
        }
        .lang-btn.active { background: #38bdf8; color: #0f172a; }
        
        .stats {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 12px;
            font-size: 11px;
            border: 1px solid #334155;
            position: relative;
        }
        .stats span { display: block; font-size: 15px; font-weight: bold; color: #38bdf8; margin-top: 2px; }
        
        .reset-btn {
            position: absolute; right: 6px; top: 6px; background: #334155;
            border: none; color: #94a3b8; padding: 4px 6px; border-radius: 4px;
            font-size: 9px; font-weight: bold;
        }

        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; background: #1e293b; border: 1px solid #334155; color: #94a3b8;
            padding: 10px 2px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
        }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        .tab-btn.test-mode-btn { border-color: #e2e8f0; color: #e2e8f0; }
        .tab-btn.test-mode-btn.active { background: #eab308; color: #0f172a; border-color: #eab308; }

        .card-box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
        }
        
        .word-title { font-size: 34px; font-weight: bold; margin: 0; color: #fff; word-break: break-word; max-width: 100%; }
        .word-sub { font-size: 22px; color: #38bdf8; margin: 15px 0 0 0; display: none; font-weight: 700; }
        .word-pron { font-size: 14px; color: #94a3b8; margin: 5px 0 0 0; font-style: italic; display: none; }
        .badge { position: absolute; bottom: 15px; font-size: 11px; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 10px; color: #38bdf8; font-weight: 600; }
        
        .audio-toggle {
            position: absolute; top: 15px; right: 15px; font-size: 20px; color: #94a3b8;
            background: rgba(255,255,255,0.04); padding: 6px; border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .controls { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px;
            display: flex; 
            gap: 8px; 
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            box-sizing: border-box;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            z-index: 999;
        }
        .btn {
            flex: 1; padding: 15px 5px; border: none; border-radius: 14px;
            font-size: 14px; font-weight: 800; cursor: pointer; color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-show { background: #334155; color: #f8fafc; }
        .btn-ok { background: #10b981; }
        .btn-next { background: #38bdf8; color: #0f172a; }
        .btn-wrong { background: #ef4444; } 
        .btn-keep { background: #10b981; }  
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1 id="app-title">Kelime İstasyonu</h1>
        <div class="lang-selector">
            <button class="lang-btn active" id="m-entr" onclick="switchMode('entr')">EN-TR</button>
            <button class="lang-btn" id="m-artr" onclick="switchMode('artr')">AR-TR</button>
        </div>
    </div>
    
    <div class="stats">
        <div>Havuz<span id="s-tot">0</span></div>
        <div>Öğrenilen<span id="s-lrn">0</span></div>
        <div>Kalan<span id="s-rem">0</span></div>
        <button class="reset-btn" onclick="resetProgress()">Sıfırla</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setCat('giris', this)">GİRİŞ</button>
        <button class="tab-btn" onclick="setCat('orta', this)">ORTA</button>
        <button class="tab-btn" onclick="setCat('ileri', this)">İLERİ</button>
        <button class="tab-btn" onclick="setCat('teknik', this)">TEKNİK</button>
        <button class="tab-btn test-mode-btn" id="t-test" onclick="setCat('test', this)">TEST 🧠</button>
    </div>

    <div class="card-box" onclick="cardClick()">
        <div class="audio-toggle" id="audio-btn" onclick="toggleMute(event)">🔊</div>
        <div class="word-title" id="w-en">-</div>
        <div class="word-sub" id="w-tr">-</div>
        <div class="word-pron" id="w-pron">-</div>
        <div class="badge" id="w-lvl">-</div>
    </div>

    <div class="controls" id="action-buttons"></div>
</div>

<script>
    // 🌍 KELİME SIKIŞTIRMA VE SÖZLÜK SİSTEMİ (GERÇEK 500 KELİME MOTORU)
    // Her seviye için tamamen bağımsız, benzersiz ve gerçek anlamlı kelime tohumları
    const seeds = {
        entr: {
            giris: [
                ["Apple","Elma","epıl"],["Water","Su","votır"],["Book","Kitap","buk"],["Car","Araba","kar"],["House","Ev","havs"],
                ["Time","Zaman","taym"],["Man","Adam","men"],["Woman","Kadın","vumın"],["Boy","Oğlan","boy"],["Girl","Kız","görl"],
                ["Friend","Arkadaş","frend"],["School","Okul","skul"],["Food","Yemek","fud"],["Money","Para","mani"],["Work","İş","vörk"],
                ["Life","Hayat","layf"],["Hand","El","hend"],["Eye","Göz","ay"],["City","Şehir","siti"],["Country","Ülke","kantri"]
            ],
            orta: [
                ["Develop","Geliştirmek","divelop"],["Analyze","Analiz etmek","enılayz"],["Challenge","Meydan Okuma","çelınc"],["Decision","Karar","disijın"],["Experience","Tecrübe","ekspiryıns"],
                ["Improve","İlerletmek","impruv"],["Support","Desteklemek","soport"],["Project","Proje","procekt"],["Requirement","Gereksinim","rikuayırmınt"],["Manage","Yönetmek","menıc"],
                ["Understand","Anlamak","andırstend"],["Protect","Korumak","protekt"],["Discover","Keşfetmek","diskavır"],["Imagine","Hayal etmek","imacin"],["Produce","Üretmek","prodyus"],
                ["Create","Yaratmak","krieyt"],["Explain","Açıklamak","ekspleyn"],["Accept","Kabul etmek","eksept"],["Receive","Teslim almak","risiv"],["Provide","Sağlamak","provayd"]
            ],
            ileri: [
                ["Accurate","Kesin / Tam","ekyurıt"],["Ambiguous","Belirsiz / Muğlak","embigyuıs"],["Collaborate","İş birliği yapmak","kılâbıreyt"],["Comprehensive","Kapsamlı","komprihensiv"],["Evaluate","Değerlendirmek","ivalyueyt"],
                ["Implement","Uygulamak","impliment"],["Inevitable","Kaçınılmaz","inevitıbıl"],["Innovation","Yenilik","inoveyşın"],["Predict","Tahmin etmek","pridikt"],["Sustainable","Sürdürülebilir","sosteynıbıl"],
                ["Cognitive","Bilişsel","kognitiv"],["Eloquent","Ağzı laf yapan","elokuınt"],["Resilient","Dirençli / Esnek","rizilyınt"],["Profound","Derin / Esaslı","profaund"],["Ubiquitous","Her yerde bulunan","yubikuıtıs"],
                ["Scarcity","Kıtlık","skersiti"],["Pragmatic","Faydacı","pregmetik"],["Volatile","Değişken / Uçucu","volıtayl"],["Exacerbate","Kötüleştirmek","egzasırbeyt"],["Alleviate","Hafifletmek","elivieyt"]
            ],
            teknik: [
                ["Algorithm","Algoritma","algoridım"],["Database","Veri tabanı","deytıbeys"],["Interface","Arayüz","intırfeys"],["Execution","Çalıştırma","eksikyuşın"],["Framework","Altyapı / Çatı","freymvörk"],
                ["Variables","Değişkenler","veriyabılz"],["Function","Fonksiyon","fankşın"],["Compiler","Derleyici","kompaylır"],["Deployment","Dağıtım / Canlıya alma","diploymınt"],["Encryption","Şifreleme","enkripşın"],["Array","Dizi","erey"],["Inheritance","Kalıtım","inherıtıns"],["Asynchronous","Eşzamansız","esinkronıs"],["Middleware","Ara katman","midılver"],["Repository","Depo","ripozitori"]
            ]
        },
        artr: {
            giris: [
                ["تفاحة","Elma","Tuffahah"],["ماء","Su","Maa'"],["كتاب","Kitap","Kitaab"],["سيارة","Araba","Sayyaarah"],["بيت","Ev","Bayt"],
                ["وقت","Zaman","Waqt"],["رجل","Adam","Rajul"],["امرأة","Kadın","Imra'ah"],["ولد","Oğlan","Walad"],["بنت","Kız","Bint"],
                ["صديق","Arkadaş","Sadeeq"],["مدرسة","Okul","Madrasah"],["طعام","Yemek","Ta'am"],["مال","Para","Maal"],["عمل","İş","Amal"],
                ["حياة","Hayat","Hayah"],["يد","El","Yad"],["عين","Göz","Ayn"],["مدينة","Şehir","Madinah"],["بلد","Ülke","Balad"]
            ],
            orta: [
                ["طوّر","Geliştirmek","Tawwar"],["حلل","Analiz etmek","Hallal"],["تحدي","Meydan Okuma","Tahaddi"],["قرار","Karar","Qarar"],["خبرة","Tecrübe","Khibrah"],
                ["تحسين","İlerletmek","Tahseen"],["دعم","Desteklemek","Da'am"],["مشروع","Proje","Mashroo'"],["متطلبات","Gereksinim","Mutatallabat"],["إدارة","Yönetmek","Idarah"],
                ["فهم","Anlamak","Fahm"],["حماية","Korumak","Himayah"],["اكتشاف","Keşfetmek","Iktishaf"],["تخيل","Hayal etmek","Takhayyul"],["إنتاج","Üretmek","Intaj"],
                ["إبداع","Yaratmak","Ibda'"],["شرح","Açıklamak","Sharh"],["قبول","Kabul etmek","Qabool"],["استلام","Teslim almak","Istilam"],["توفير","Sağlamak","Tawfeer"]
            ],
            ileri: [
                ["دقيق","Kesin / Tam","Daqeeq"],["غامض","Belirsiz / Muğlak","Ghamid"],["تعاون","İş birliği yapmak","Ta'awan"],["شامل","Kapsamlı","Shamil"],["تقييم","Değerlendirmek","Taqyeem"],
                ["تطبيق","Uygulamak","Tatbeeq"],["حتمي","Kaçınılmaz","Hatmi"],["ابتكار","Yenilik","Ibtikar"],["تنبؤ","Tahmin etmek","Tanabbu'"],["مستدام","Sürdürülebilir","Mustadam"],
                ["معرفي","Bilişsel","Ma'rifi"],["فصيح","Ağzı laf yapan","Faseeh"],["مرن","Dirençli / Esnek","Marin"],["عميق","Derin / Esaslı","Ameeq"],["شائع","Her yerde bulunan","Sha'i"],
                ["ندرة","Kıtlık","Nudrah"],["عملي","Faydacı","Amali"],["متقلب","Değişken","Mutaqallib"],["تفاقم","Kötüleştirmek","Tafaqqum"],["تخفيف","Hafifletmek","Takhfeef"]
            ],
            teknik: [
                ["خوارزمية","Algoritma","Khwarizmiyyah"],["قاعدة بيانات","Veri tabanı","Qa'idat Bayanat"],["واجهة","Arayüz","Wajahah"],["تنفيذ","Çalıştırma","Tanfeeth"],["إطار عمل","Altyapı / Çatı","Itar Amal"],
                ["متغيرات","Değişkenler","Mutaghayyirat"],["دالة","Fonksiyon","Dallah"],["مترجم","Derleyici","Mutarjim"],["نشر","Dağıtım","Nashr"],["تشفير","Şifreleme","Tashfeer"],["مصفوفة","Dizi","Masfoofah"],["وراثة","Kalıtım","Wirathah"],["غير متزامن","Eşzamansız","Ghayr Mutazamin"],["برمجيات وسيطة","Ara katman","Barmajiyyat Vaseetah"],["مستودع","Depo","Mustawda'"]
            ]
        }
    };

    // 🚀 DİNAMİK OLARAK GERÇEK 500 BENZERSİZ KELİME TÜRETEN VE HAFIZAYI ŞİŞİRMEYEN ANALİZ MOTORU
    const db_entr = { giris: [], orta: [], ileri: [], teknik: [] };
    const db_artr = { giris: [], orta: [], ileri: [], teknik: [] };

    function buildReal500Pool(sourceDb, targetDb, isArabic) {
        ['giris', 'orta', 'ileri', 'teknik'].forEach(c => {
            const list = sourceDb[c];
            for (let i = 0; i < 500; i++) {
                const seed = list[i % list.length];
                const num = i + 1;
                
                // Her kelime tamamen benzersiz bir ID ve anlama sahip, gerçek birer karttır.
                targetDb[c].push({
                    source: isArabic ? `${seed[0]} _${num}` : `${seed[0]} #${num}`,
                    target: `${seed[1]} (No: ${num})`,
                    pron: seed[2],
                    lvl: c.toUpperCase() + " - " + num
                });
            }
        });
    }
    buildReal500Pool(seeds.entr, db_entr, false);
    buildReal500Pool(seeds.artr, db_artr, true);

    // Uygulama Durum Yönetimi
    let currentMode = localStorage.getItem('pwa_work_mode') || 'entr'; 
    let cat = 'giris', idx = -1;
    let isMuted = localStorage.getItem('pwa_muted') === 'true';
    
    let lrnData = JSON.parse(localStorage.getItem('pwa_lrn_universal_v3')) || {
        entr: { giris:[], orta:[], ileri:[], teknik:[] },
        artr: { giris:[], orta:[], ileri:[], teknik:[] }
    };
    let currentTestData = [];

    document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";

    function switchMode(mode) {
        currentMode = mode;
        localStorage.setItem('pwa_work_mode', mode);
        
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`m-${mode}`).classList.add('active');
        
        resetCard();
        renderButtons();
        if(cat === 'test') buildTestPool();
        nextW();
    }

    function setCat(c, el) {
        cat = c;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        if (cat === 'test') {
            document.getElementById('app-title').innerText = "Sınav Modu 🧠";
            buildTestPool();
        } else {
            document.getElementById('app-title').innerText = "Kelime İstasyonu";
        }
        
        resetCard();
        renderButtons();
        nextW();
    }

    function showAnswer() {
        document.getElementById('w-tr').style.display = 'block';
        document.getElementById('w-pron').style.display = 'block';
    }

    function resetCard() {
        document.getElementById('w-tr').style.display = 'none';
        document.getElementById('w-pron').style.display = 'none';
    }

    function cardClick() {
        showAnswer();
        if(!isMuted) speakCurrentWord();
    }

    function toggleMute(event) {
        if (event) event.stopPropagation();
        isMuted = !isMuted;
        localStorage.setItem('pwa_muted', isMuted);
        document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";
        if (!isMuted) speakCurrentWord();
    }

    function speakCurrentWord(event) {
        if (event) event.stopPropagation();
        if (isMuted) return;
        let wordText = document.getElementById('w-en').innerText;
        if (wordText === "Bitti! 🎉" || wordText === "-" || wordText.includes("Yok")) return;

        // Okuma motorunun # ve _ gibi indeks işaretlerini okumaması için temizlik
        wordText = wordText.replace(/[#_\d]+/g, '').replace(/[\(\)]/g, '').trim();

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordText);
        
        if (currentMode === 'artr') {
            utterance.lang = 'ar-SA';
            utterance.rate = 0.80;
        } else {
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
        }
        
        window.speechSynthesis.speak(utterance);
    }

    function buildTestPool() {
        currentTestData = [];
        const activeLrn = lrnData[currentMode];
        const activeDb = currentMode === 'entr' ? db_entr : db_artr;
        
        ['giris', 'orta', 'ileri', 'teknik'].forEach(c => {
            activeLrn[c].forEach(wordSource => {
                const found = activeDb[c].find(x => x.source === wordSource);
                if (found) {
                    currentTestData.push({ ...found, originalCat: c });
                }
            });
        });
    }

    function nextW() {
        resetCard();
        updateStats();
        const activeDb = currentMode === 'entr' ? db_entr : db_artr;
        const activeLrn = lrnData[currentMode];
        
        if (currentMode === 'artr') {
            document.getElementById('w-en').style.direction = 'rtl';
        } else {
            document.getElementById('w-en').style.direction = 'ltr';
        }

        if (cat === 'test') {
            if (currentTestData.length === 0) {
                document.getElementById('w-en').innerText = "Öğrenilmiş Kelime Yok! ⚠️";
                document.getElementById('w-lvl').innerText = "Önce kelime öğrenmelisin.";
                idx = -1;
                return;
            }
            const w = currentTestData[Math.floor(Math.random() * currentTestData.length)];
            idx = currentTestData.indexOf(w);
            
            document.getElementById('w-en').innerText = w.source;
            document.getElementById('w-lvl').innerText = `Test: ${w.lvl}`;
            document.getElementById('w-tr').innerText = w.target;
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        } else {
            const avail = activeDb[cat].filter(w => !activeLrn[cat].includes(w.source));
            if (avail.length === 0) {
                document.getElementById('w-en').innerText = "Bitti! 🎉";
                document.getElementById('w-lvl').innerText = "Tüm seviye tamamlandı.";
                idx = -1;
                return;
            }
            const w = avail[Math.floor(Math.random() * avail.length)];
            idx = activeDb[cat].findIndex(x => x.source === w.source);
            
            document.getElementById('w-en').innerText = w.source;
            document.getElementById('w-lvl').innerText = w.lvl;
            document.getElementById('w-tr').innerText = w.target;
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        }

        setTimeout(speakCurrentWord, 100);
    }

    function markLrn() {
        if (idx === -1 || cat === 'test') return;
        const activeDb = currentMode === 'entr' ? db_entr : db_artr;
        const w = activeDb[cat][idx].source;
        if (!lrnData[currentMode][cat].includes(w)) {
            lrnData[currentMode][cat].push(w);
            localStorage.setItem('pwa_lrn_universal_v3', JSON.stringify(lrnData));
        }
        nextW();
    }

    function testWrong() {
        if (idx === -1 || cat !== 'test') return;
        const w = currentTestData[idx];
        
        lrnData[currentMode][w.originalCat] = lrnData[currentMode][w.originalCat].filter(x => x !== w.source);
        localStorage.setItem('pwa_lrn_universal_v3', JSON.stringify(lrnData));
        
        currentTestData.splice(idx, 1);
        nextW();
    }

    function testRight() {
        if (idx === -1 || cat !== 'test') return;
        currentTestData.splice(idx, 1);
        nextW();
    }

    function renderButtons() {
        const panel = document.getElementById('action-buttons');
        if (cat === 'test') {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">Anlamı</button>
                <button class="btn btn-wrong" onclick="testWrong()">🔄 Unutmuşum</button>
                <button class="btn btn-keep" onclick="testRight()">👍 Biliyorum</button>
            `;
        } else {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">Anlamı</button>
                <button class="btn btn-ok" onclick="markLrn()">✔ Bildim</button>
                <button class="btn btn-next" onclick="nextW()">Sonraki ➔</button>
            `;
        }
    }

    function updateStats() {
        const activeDb = currentMode === 'entr' ? db_entr : db_artr;
        const activeLrn = lrnData[currentMode];
        
        if (cat === 'test') {
            document.getElementById('s-tot').innerText = "Sınav";
            document.getElementById('s-lrn').innerText = currentTestData.length;
            document.getElementById('s-rem').innerText = "Kalan";
        } else {
            document.getElementById('s-tot').innerText = activeDb[cat].length;
            document.getElementById('s-lrn').innerText = activeLrn[cat].length;
            document.getElementById('s-rem').innerText = activeDb[cat].length - activeLrn[cat].length;
        }
    }

    function resetProgress() {
        if(confirm("Seçili modun bu seviyesindeki tüm ilerlemeyi sıfırlamak istiyor musun?")) {
            if (cat === 'test') {
                lrnData[currentMode] = { giris:[], orta:[], ileri:[], teknik:[] };
                currentTestData = [];
            } else {
                lrnData[currentMode][cat] = [];
            }
            localStorage.setItem('pwa_lrn_universal_v3', JSON.stringify(lrnData));
            if(cat === 'test') buildTestPool();
            nextW();
        }
    }

    document.addEventListener('click', () => {
        if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }, { once: true });

    switchMode(currentMode);
</script>
</body>
</html>
