<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kelime İstasyonu Sınav</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Kelime%20Istasyonu%22%2C%22short_name%22%3A%22KelimeIst%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%230f172a%22%7D">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            padding-top: calc(15px + env(safe-area-inset-top));
            padding-bottom: calc(95px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Android tek sayfa garantisi için kaydırmayı engelle */
            -webkit-user-select: none;
            user-select: none;
        }
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; }
        h1 { font-size: 20px; margin: 0 0 10px 0; color: #f8fafc; font-weight: 800; text-align: center; }
        
        .stats {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 12px;
            font-size: 11px;
            border: 1px solid #334155;
            position: relative;
        }
        .stats span { display: block; font-size: 15px; font-weight: bold; color: #38bdf8; margin-top: 2px; }
        
        .reset-btn {
            position: absolute; right: 6px; top: 6px; background: #334155;
            border: none; color: #94a3b8; padding: 4px 6px; border-radius: 4px;
            font-size: 9px; font-weight: bold;
        }

        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; background: #1e293b; border: 1px solid #334155; color: #94a3b8;
            padding: 10px 2px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
        }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        .tab-btn.test-mode-btn { border-color: #e2e8f0; color: #e2e8f0; }
        .tab-btn.test-mode-btn.active { background: #eab308; color: #0f172a; border-color: #eab308; }

        /* 📱 EKRANA TAM ORANLANAN KART ALANI */
        .card-box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
        }
        
        .word-title { font-size: 38px; font-weight: bold; margin: 0; color: #fff; word-break: break-word; }
        .word-sub { font-size: 22px; color: #38bdf8; margin: 15px 0 0 0; display: none; font-weight: 700; }
        .word-pron { font-size: 14px; color: #94a3b8; margin: 5px 0 0 0; font-style: italic; display: none; }
        .badge { position: absolute; bottom: 15px; font-size: 11px; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 10px; color: #38bdf8; font-weight: 600; }
        
        /* 🔊 SES KISMA/AÇMA BUTONU */
        .audio-toggle {
            position: absolute; top: 15px; right: 15px; font-size: 20px; color: #94a3b8;
            background: rgba(255,255,255,0.04); padding: 6px; border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* 🔒 ANDROID VE IOS NAVİGASYON UYUMLU ALT PANEL */
        .controls { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px;
            display: flex; 
            gap: 8px; 
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            box-sizing: border-box;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            z-index: 999;
        }
        .btn {
            flex: 1; padding: 15px 5px; border: none; border-radius: 14px;
            font-size: 14px; font-weight: 800; cursor: pointer; color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-show { background: #334155; color: #f8fafc; }
        .btn-ok { background: #10b981; }
        .btn-next { background: #38bdf8; color: #0f172a; }
        
        /* Sınav Modu Buton Renkleri */
        .btn-wrong { background: #ef4444; } /* Unutmuşum */
        .btn-keep { background: #10b981; }  /* Hala Biliyorum */
    </style>
</head>
<body>

<div class="container">
    <h1 id="app-title">Kelime İstasyonu</h1>
    
    <div class="stats">
        <div>Havuz<span id="s-tot">0</span></div>
        <div>Öğrenilen<span id="s-lrn">0</span></div>
        <div>Kalan<span id="s-rem">0</span></div>
        <button class="reset-btn" onclick="resetProgress()">Sıfırla</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setCat('giris', this)">GİRİŞ</button>
        <button class="tab-btn" onclick="setCat('orta', this)">ORTA</button>
        <button class="tab-btn" onclick="setCat('ileri', this)">İLERİ</button>
        <button class="tab-btn" onclick="setCat('teknik', this)">TEKNİK</button>
        <button class="tab-btn test-mode-btn" onclick="setCat('test', this)">TEST MODU 🧠</button>
    </div>

    <div class="card-box" onclick="cardClick()">
        <div class="audio-toggle" id="audio-btn" onclick="toggleMute(event)">🔊</div>
        <div class="word-title" id="w-en">-</div>
        <div class="word-sub" id="w-tr">-</div>
        <div class="word-pron" id="w-pron">-</div>
        <div class="badge" id="w-lvl">-</div>
    </div>

    <div class="controls" id="action-buttons">
        </div>
</div>

<script>
    // Ham, temizlenmiş kelime listeleri (Sayı eklemeleri kaldırıldı)
    const db = {
        giris: [
            { en: "About", tr: "Hakkında / Yaklaşık", pron: "ıbaut", lvl: "A1-A2" },
            { en: "All", tr: "Hepsi / Tüm", pron: "ol", lvl: "A1-A2" },
            { en: "Apple", tr: "Elma", pron: "epıl", lvl: "A1-A2" },
            { en: "Baby", tr: "Bebek", pron: "beybi", lvl: "A1-A2" },
            { en: "Beautiful", tr: "Güzel", pron: "byutıful", lvl: "A1-A2" },
            { en: "Book", tr: "Kitap", pron: "buk", lvl: "A1-A2" },
            { en: "Car", tr: "Araba", pron: "kar", lvl: "A1-A2" },
            { en: "Day", tr: "Gün", pron: "dey", lvl: "A1-A2" },
            { en: "Friend", tr: "Arkadaş", pron: "frend", lvl: "A1-A2" },
            { en: "House", tr: "Ev", pron: "havs", lvl: "A1-A2" },
            { en: "Life", tr: "Hayat", pron: "layf", lvl: "A1-A2" },
            { en: "Money", tr: "Para", pron: "mani", lvl: "A1-A2" },
            { en: "School", tr: "Okul", pron: "skul", lvl: "A1-A2" },
            { en: "Water", tr: "Su", pron: "votır", lvl: "A1-A2" },
            { en: "Work", tr: "İş / Çalışmak", pron: "vörk", lvl: "A1-A2" }
        ],
        orta: [
            { en: "Ability", tr: "Yetenek / Kabiliyet", pron: "ıbiliti", lvl: "B1-B2" },
            { en: "Analyze", tr: "Analiz etmek", pron: "enılayz", lvl: "B1-B2" },
            { en: "Challenge", tr: "Zorluk / Meydan okuma", pron: "çelınc", lvl: "B1-B2" },
            { en: "Decision", tr: "Karar", pron: "disijın", lvl: "B1-B2" },
            { en: "Develop", tr: "Geliştirmek", pron: "divelop", lvl: "B1-B2" },
            { en: "Experience", tr: "Tecrübe / Deneyim", pron: "ekspiryıns", lvl: "B1-B2" },
            { en: "Improve", tr: "Geliştirmek / İyileştirmek", pron: "impruv", lvl: "B1-B2" },
            { en: "Project", tr: "Proje", pron: "procekt", lvl: "B1-B2" },
            { en: "Requirement", tr: "Gereksinim / Şart", pron: "rikuayırmınt", lvl: "B1-B2" },
            { en: "Support", tr: "Desteklemek", pron: "soport", lvl: "B1-B2" }
        ],
        ileri: [
            { en: "Accurate", tr: "Kesin / Hatasız / Tam", pron: "ekyurıt", lvl: "C1-C2" },
            { en: "Ambiguous", tr: "Belirsiz / Muğlak", pron: "embigyuıs", lvl: "C1-C2" },
            { en: "Collaborate", tr: "İş birliği yapmak", pron: "kılâbıreyt", lvl: "C1-C2" },
            { en: "Comprehensive", tr: "Kapsamlı / Detaylı", pron: "komprihensiv", lvl: "C1-C2" },
            { en: "Evaluate", tr: "Değerlendirmek", pron: "ivalyueyt", lvl: "C1-C2" },
            { en: "Implement", tr: "Uygulamaya koymak", pron: "impliment", lvl: "C1-C2" },
            { en: "Inevitable", tr: "Kaçınılmaz", pron: "inevitıbıl", lvl: "C1-C2" },
            { en: "Innovation", tr: "Yenilikçilik / İnovasyon", pron: "inoveyşın", lvl: "C1-C2" },
            { en: "Predict", tr: "Tahmin etmek", pron: "pridikt", lvl: "C1-C2" },
            { en: "Sustainable", tr: "Sürdürülebilir", pron: "sosteynıbıl", lvl: "C1-C2" }
        ],
        teknik: [
            { en: "Algorithm", tr: "Algoritma", pron: "algoridım", lvl: "Teknik" },
            { en: "Calculation", tr: "Hesaplama", pron: "kelkyuleyşın", lvl: "Teknik" },
            { en: "Coordinate", tr: "Koordinat", pron: "koordinıyt", lvl: "Teknik" },
            { en: "Database", tr: "Veri tabanı", pron: "deytıbeys", lvl: "Teknik" },
            { en: "Elevation", tr: "Yükseklik / Rakım", pron: "eliveyşın", lvl: "Teknik" },
            { en: "Execute", tr: "Çalıştırmak (Kod)", pron: "eksikyut", lvl: "Teknik" },
            { en: "Expropriation", tr: "Kamulaştırma", pron: "ekspropriyeşın", lvl: "Teknik" },
            { en: "Interface", tr: "Arayüz", pron: "intırfeys", lvl: "Teknik" },
            { en: "Surveying", tr: "Haritacılık / Arazi Ölçümü", pron: "sörveying", lvl: "Teknik" },
            { en: "Topography", tr: "Topografya / Arazi yapısı", pron: "tıpografı", lvl: "Teknik" }
        ]
    };

    let cat = 'giris', idx = -1;
    let isMuted = localStorage.getItem('pwa_muted') === 'true';
    let lrn = JSON.parse(localStorage.getItem('pwa_lrn_final')) || {giris:[],orta:[],ileri:[],teknik:[]};
    let currentTestData = []; // Test modundaki güncel alt havuz

    // Ses ikonunun durumunu eşitle
    document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";

    function setCat(c, el) {
        cat = c;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        if (cat === 'test') {
            document.getElementById('app-title').innerText = "Sınav Modu 🧠";
            buildTestPool();
        } else {
            document.getElementById('app-title').innerText = "Kelime İstasyonu";
        }
        
        resetCard();
        renderButtons();
        nextW();
    }

    function showAnswer() {
        document.getElementById('w-tr').style.display = 'block';
        document.getElementById('w-pron').style.display = 'block';
    }

    function resetCard() {
        document.getElementById('w-tr').style.display = 'none';
        document.getElementById('w-pron').style.display = 'none';
    }

    function cardClick() {
        showAnswer();
        if(!isMuted) speakCurrentWord();
    }

    function toggleMute(event) {
        if (event) event.stopPropagation();
        isMuted = !isMuted;
        localStorage.setItem('pwa_muted', isMuted);
        document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";
        if (!isMuted) speakCurrentWord();
    }

    function speakCurrentWord(event) {
        if (event) event.stopPropagation();
        if (isMuted) return;
        const wordText = document.getElementById('w-en').innerText;
        if (wordText === "Bitti! 🎉" || wordText === "-" || wordText.includes("Yok")) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordText);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    // 🎯 SINAV MODU HAVUZ OLUŞTURUCU (Öğrenilen kelimeleri harmanlar)
    function buildTestPool() {
        currentTestData = [];
        ['giris', 'orta', 'ileri', 'teknik'].forEach(c => {
            lrn[c].forEach(wordEn => {
                const found = db[c].find(x => x.en === wordEn);
                if (found) {
                    currentTestData.push({ ...found, originalCat: c });
                }
            });
        });
    }

    function nextW() {
        resetCard();
        updateStats();
        
        if (cat === 'test') {
            if (currentTestData.length === 0) {
                document.getElementById('w-en').innerText = "Öğrenilmiş Kelime Yok! ⚠️";
                document.getElementById('w-lvl').innerText = "Önce diğer modlarda kelime öğrenmelisin.";
                idx = -1;
                return;
            }
            const w = currentTestData[Math.floor(Math.random() * currentTestData.length)];
            idx = currentTestData.indexOf(w);
            
            document.getElementById('w-en').innerText = w.en;
            document.getElementById('w-lvl').innerText = `Test: ${w.lvl}`;
            document.getElementById('w-tr').innerText = w.tr;
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        } else {
            const avail = db[cat].filter(w => !lrn[cat].includes(w.en));
            if (avail.length === 0) {
                document.getElementById('w-en').innerText = "Bitti! 🎉";
                document.getElementById('w-lvl').innerText = "Tüm kelimeleri öğrendin.";
                idx = -1;
                return;
            }
            const w = avail[Math.floor(Math.random() * avail.length)];
            idx = db[cat].findIndex(x => x.en === w.en);
            
            document.getElementById('w-en').innerText = w.en;
            document.getElementById('w-lvl').innerText = w.lvl;
            document.getElementById('w-tr').innerText = w.tr;
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        }

        setTimeout(speakCurrentWord, 100);
    }

    // Normal Modda Doğru İşaretleme
    function markLrn() {
        if (idx === -1 || cat === 'test') return;
        const w = db[cat][idx].en;
        if (!lrn[cat].includes(w)) {
            lrn[cat].push(w);
            localStorage.setItem('pwa_lrn_final', JSON.stringify(lrn));
        }
        nextW();
    }

    // 🧠 Sınav Modu: Unutmuşum (Kelimeyi öğrenilenlerden sil, ana havuza at)
    function testWrong() {
        if (idx === -1 || cat !== 'test') return;
        const w = currentTestData[idx];
        
        // Öğrenilenler listesinden çıkart
        lrn[w.originalCat] = lrn[w.originalCat].filter(x => x !== w.en);
        localStorage.setItem('pwa_lrn_final', JSON.stringify(lrn));
        
        // Test alt havuzundan da çıkart ve sonraki kelimeye geç
        currentTestData.splice(idx, 1);
        nextW();
    }

    // 🧠 Sınav Modu: Hala Biliyorum (Listede kalsın, sıradakine geç)
    function testRight() {
        if (idx === -1 || cat !== 'test') return;
        // Kelime zaten listede, sadece alt test havuzundan anlık eliyoruz ki aynı sınav oturumunda mükerrer gelmesin
        currentTestData.splice(idx, 1);
        nextW();
    }

    // 🔒 MODA GÖRE ALT TUŞLARI DİNAMİK YÜKLEME (Android Çakışma Önleyici)
    function renderButtons() {
        const panel = document.getElementById('action-buttons');
        if (cat === 'test') {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">Anlamı</button>
                <button class="btn btn-wrong" onclick="testWrong()">🔄 Unutmuşum</button>
                <button class="btn btn-keep" onclick="testRight()">👍 Biliyorum</button>
            `;
        } else {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">Anlamı</button>
                <button class="btn btn-ok" onclick="markLrn()">✔ Bildim</button>
                <button class="btn btn-next" onclick="nextW()">Sonraki ➔</button>
            `;
        }
    }

    function updateStats() {
        if (cat === 'test') {
            document.getElementById('s-tot').innerText = "Sınav";
            document.getElementById('s-lrn').innerText = currentTestData.length;
            document.getElementById('s-rem').innerText = "Kalan";
        } else {
            document.getElementById('s-tot').innerText = db[cat].length;
            document.getElementById('s-lrn').innerText = lrn[cat].length;
            document.getElementById('s-rem').innerText = db[cat].length - lrn[cat].length;
        }
    }

    function resetProgress() {
        const msg = cat === 'test' ? "Tüm kategorilerin ilerlemesini sıfırlamak istiyor musun?" : "Bu seviyedeki tüm ilerlemeyi sıfırlamak istiyor musun?";
        if(confirm(msg)) {
            if (cat === 'test') {
                lrn = {giris:[],orta:[],ileri:[],teknik:[]};
                currentTestData = [];
            } else {
                lrn[cat] = [];
            }
            localStorage.setItem('pwa_lrn_final', JSON.stringify(lrn));
            if(cat === 'test') buildTestPool();
            nextW();
        }
    }

    // 🤖 ANDROID PWA ÇALIŞMA PRENSİBİ VE ÖNBELLEK MOTORU
    if ('serviceWorker' in navigator) {
        // Kod her güncellendiğinde Android cihazların eski önbellekte kalmasını önleyen dinamik yapı
        const swCode = `
            const cacheName = 'istasyon-v5';
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('activate', e => e.waitUntil(caches.keys().then(keys => Promise.all(keys.map(k => k !== cacheName && caches.delete(k))))));
            self.addEventListener('fetch', e => {});
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).then(reg => {
            // Android Chrome uygulamasında arka planda güncelleme kontrolünü tetikler
            reg.update();
        });
    }

    // İlk Çalıştırma
    renderButtons(); updateStats(); nextW();
</script>
</body>
</html>
