<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kelime İstasyonu PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="display" content="fullscreen">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Kelime%20Istasyonu%22%2C%22short_name%22%3A%22KelimeIst%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22fullscreen%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%230f172a%22%2C%22theme_color%22%3A%22%230f172a%22%7D">

    <style>
        :root { --direction: ltr; --text-align: left; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            /* Android barları gizlendiğinde çakışmayı önleyen korumalı üst/alt alanlar */
            padding-top: calc(12px + env(safe-area-inset-top));
            padding-bottom: calc(90px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .container { width: 100%; max-width: 450px; display: flex; flex-direction: column; height: 100%; }
        
        /* 🌐 ÜST PANEL: BAŞLIK VE DİL SEÇİCİ */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        h1 { font-size: 19px; margin: 0; color: #f8fafc; font-weight: 800; }
        
        .lang-selector {
            display: flex;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 2px;
        }
        .lang-btn {
            background: transparent; border: none; color: #94a3b8; 
            padding: 5px 10px; font-size: 11px; font-weight: bold; border-radius: 15px; cursor: pointer;
        }
        .lang-btn.active { background: #38bdf8; color: #0f172a; }
        
        .stats {
            background: #1e293b;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 12px;
            font-size: 11px;
            border: 1px solid #334155;
            position: relative;
        }
        .stats settle { display: block; font-size: 15px; font-weight: bold; color: #38bdf8; margin-top: 2px; }
        
        .reset-btn {
            position: absolute; right: 6px; top: 6px; background: #334155;
            border: none; color: #94a3b8; padding: 4px 6px; border-radius: 4px;
            font-size: 9px; font-weight: bold;
        }

        .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; background: #1e293b; border: 1px solid #334155; color: #94a3b8;
            padding: 10px 2px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
            white-space: nowrap;
        }
        .tab-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        .tab-btn.test-mode-btn { border-color: #e2e8f0; color: #e2e8f0; }
        .tab-btn.test-mode-btn.active { background: #eab308; color: #0f172a; border-color: #eab308; }

        /* 📱 TEK SAYFA ORANLI TEMİZ KART */
        .card-box {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 20px;
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 15px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            text-align: center;
        }
        
        .word-title { font-size: 40px; font-weight: bold; margin: 0; color: #fff; word-break: break-word; }
        
        /* Arapça dil yönüne (RTL) göre dinamik esneyen anlam alanı */
        .word-sub { 
            font-size: 24px; 
            color: #38bdf8; 
            margin: 15px 0 0 0; 
            display: none; 
            font-weight: 700;
            direction: var(--direction);
            text-align: var(--text-align);
        }
        .word-pron { font-size: 14px; color: #94a3b8; margin: 5px 0 0 0; font-style: italic; display: none; }
        .badge { position: absolute; bottom: 15px; font-size: 11px; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 10px; color: #38bdf8; font-weight: 600; }
        
        .audio-toggle {
            position: absolute; top: 15px; right: 15px; font-size: 20px; color: #94a3b8;
            background: rgba(255,255,255,0.04); padding: 6px; border-radius: 50%; width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* 🔒 EN ALTA SABİTLENEN KONTROLLER */
        .controls { 
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #0f172a;
            padding: 12px 15px calc(12px + env(safe-area-inset-bottom)) 15px;
            display: flex; 
            gap: 8px; 
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            box-sizing: border-box;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            z-index: 999;
        }
        .btn {
            flex: 1; padding: 15px 5px; border: none; border-radius: 14px;
            font-size: 14px; font-weight: 800; cursor: pointer; color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-show { background: #334155; color: #f8fafc; }
        .btn-ok { background: #10b981; }
        .btn-next { background: #38bdf8; color: #0f172a; }
        .btn-wrong { background: #ef4444; } 
        .btn-keep { background: #10b981; }  
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1 id="app-title">Kelime İstasyonu</h1>
        <div class="lang-selector">
            <button class="lang-btn active" id="l-tr" onclick="changeLanguage('tr')">TR</button>
            <button class="lang-btn" id="l-ar" onclick="changeLanguage('ar')">AR</button>
        </div>
    </div>
    
    <div class="stats">
        <div id="lbl-pool">Havuz<settle id="s-tot">0</settle></div>
        <div id="lbl-learn">Öğrenilen<settle id="s-lrn">0</settle></div>
        <div id="lbl-rem">Kalan<settle id="s-rem">0</settle></div>
        <button class="reset-btn" id="lbl-reset" onclick="resetProgress()">Sıfırla</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="t-giris" onclick="setCat('giris', this)">GİRİŞ</button>
        <button class="tab-btn" id="t-orta" onclick="setCat('orta', this)">ORTA</button>
        <button class="tab-btn" id="t-ileri" onclick="setCat('ileri', this)">İLERİ</button>
        <button class="tab-btn" id="t-teknik" onclick="setCat('teknik', this)">TEKNİK</button>
        <button class="tab-btn test-mode-btn" id="t-test" onclick="setCat('test', this)">TEST 🧠</button>
    </div>

    <div class="card-box" onclick="cardClick()">
        <div class="audio-toggle" id="audio-btn" onclick="toggleMute(event)">🔊</div>
        <div class="word-title" id="w-en">-</div>
        <div class="word-sub" id="w-tr">-</div>
        <div class="word-pron" id="w-pron">-</div>
        <div class="badge" id="w-lvl">-</div>
    </div>

    <div class="controls" id="action-buttons"></div>
</div>

<script>
    // 🌍 ÇİFT DİLLİ (TR/AR) GELİŞMİŞ VERİ MODELİ
    const db = {
        giris: [
            { en: "About", tr: "Hakkında / Yaklaşık", ar: "حول / تقريباً", pron: "ıbaut", lvl: "A1-A2" },
            { en: "All", tr: "Hepsi / Tüm", ar: "الكل / جميع", pron: "ol", lvl: "A1-A2" },
            { en: "Apple", tr: "Elma", ar: "تفاحة", pron: "epıl", lvl: "A1-A2" },
            { en: "Baby", tr: "Bebek", ar: "طفل رضيع", pron: "beybi", lvl: "A1-A2" },
            { en: "Beautiful", tr: "Güzel", ar: "جميل", pron: "byutıful", lvl: "A1-A2" },
            { en: "Book", tr: "Kitap", ar: "كتاب", pron: "buk", lvl: "A1-A2" },
            { en: "Car", tr: "Araba", ar: "سيارة", pron: "kar", lvl: "A1-A2" },
            { en: "Day", tr: "Gün", ar: "يوم", pron: "dey", lvl: "A1-A2" },
            { en: "Friend", tr: "Arkadaş", ar: "صديق", pron: "frend", lvl: "A1-A2" },
            { en: "House", tr: "Ev", ar: "منزل", pron: "havs", lvl: "A1-A2" }
        ],
        orta: [
            { en: "Ability", tr: "Yetenek / Kabiliyet", ar: "قدرة / موهبة", pron: "ıbiliti", lvl: "B1-B2" },
            { en: "Analyze", tr: "Analiz etmek", ar: "يحلل", pron: "enılayz", lvl: "B1-B2" },
            { en: "Challenge", tr: "Zorluk / Meydan okuma", ar: "تحدي", pron: "çelınc", lvl: "B1-B2" },
            { en: "Decision", tr: "Karar", ar: "قرار", pron: "disijın", lvl: "B1-B2" },
            { en: "Develop", tr: "Geliştirmek", ar: "يطور", pron: "divelop", lvl: "B1-B2" },
            { en: "Experience", tr: "Tecrübe / Deneyim", ar: "خبرة / تجربة", pron: "ekspiryıns", lvl: "B1-B2" }
        ],
        ileri: [
            { en: "Accurate", tr: "Kesin / Hatasız / Tam", ar: "دقيق / مضبوط", pron: "ekyurıt", lvl: "C1-C2" },
            { en: "Ambiguous", tr: "Belirsiz / Muğlak", ar: "غامض / مبهم", pron: "embigyuıs", lvl: "C1-C2" },
            { en: "Collaborate", tr: "İş birliği yapmak", ar: "يتعاون", pron: "kılâbıreyt", lvl: "C1-C2" },
            { en: "Comprehensive", tr: "Kapsamlı / Detaylı", ar: "شامل / مستفيض", pron: "komprihensiv", lvl: "C1-C2" },
            { en: "Evaluate", tr: "Değerlendirmek", ar: "يقيم", pron: "ivalyueyt", lvl: "C1-C2" }
        ],
        teknik: [
            { en: "Algorithm", tr: "Algoritma", ar: "خوارزمية", pron: "algoridım", lvl: "Teknik" },
            { en: "Calculation", tr: "Hesaplama", ar: "حساب / عملية حسابية", pron: "kelkyuleyşın", lvl: "Teknik" },
            { en: "Coordinate", tr: "Koordinat", ar: "إحداثي", pron: "koordinıyt", lvl: "Teknik" },
            { en: "Database", tr: "Veri tabanı", ar: "قاعدة بيانات", pron: "deytıbeys", lvl: "Teknik" },
            { en: "Elevation", tr: "Yükseklik / Rakım", ar: "ارتفاع / منسوب", pron: "eliveyşın", lvl: "Teknik" }
        ]
    };

    // Arayüz Çeviri Haritası
    const uiLang = {
        tr: { title: "Kelime İstasyonu", testTitle: "Sınav Modu 🧠", pool: "Havuz", lrn: "Öğrenilen", rem: "Kalan", reset: "Sıfırla", show: "Anlamı", ok: "✔ Bildim", next: "Sonraki ➔", wrong: "🔄 Unutmuşum", keep: "👍 Biliyorum", noWord: "Kelime Yok!", bitti: "Bitti! 🎉" },
        ar: { title: "محطة الكلمات", testTitle: "وضع الاختبار 🧠", pool: "المخزن", lrn: "المكتسبة", rem: "المتبقي", reset: "تصفير", show: "المعنى", ok: "✔ عرفتها", next: "التالي ➔", wrong: "🔄 نسيتها", keep: "👍 ما زلت أعرفها", noWord: "لا توجد كلمات!", bitti: "انتهى! 🎉" }
    };

    let currentLang = localStorage.getItem('pwa_lang') || 'tr';
    let cat = 'giris', idx = -1;
    let isMuted = localStorage.getItem('pwa_muted') === 'true';
    let lrn = JSON.parse(localStorage.getItem('pwa_lrn_v5')) || {giris:[],orta:[],ileri:[],teknik:[]};
    let currentTestData = [];

    document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";

    function changeLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('pwa_lang', lang);
        
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`l-${lang}`).classList.add('active');
        
        // RTL / LTR Yapı Ayarı
        if (lang === 'ar') {
            document.documentElement.style.setProperty('--direction', 'rtl');
            document.documentElement.style.setProperty('--text-align', 'right');
        } else {
            document.documentElement.style.setProperty('--direction', 'ltr');
            document.documentElement.style.setProperty('--text-align', 'left');
        }
        
        translateUI();
        renderButtons();
        if(cat === 'test') buildTestPool();
        updateStats();
        // Karttaki açık kelime varsa dilini güncelle
        if(idx !== -1) {
            let activeList = cat === 'test' ? currentTestData : db[cat].filter(w => !lrn[cat].includes(w.en));
            if(activeList[idx]) document.getElementById('w-tr').innerText = activeList[idx][currentLang];
        }
    }

    function translateUI() {
        const ui = uiLang[currentLang];
        document.getElementById('app-title').innerText = cat === 'test' ? ui.testTitle : ui.title;
        document.getElementById('lbl-pool').firstChild.textContent = ui.pool;
        document.getElementById('lbl-learn').firstChild.textContent = ui.lrn;
        document.getElementById('lbl-rem').firstChild.textContent = ui.rem;
        document.getElementById('lbl-reset').innerText = ui.reset;
        
        // Kategorileri Çevir (İsteğe bağlı, evrensel kalsın diye dokunulmadı ama buton kimlikleri güncellenebilir)
        document.getElementById('t-test').innerText = currentLang === 'ar' ? "اختبار 🧠" : "TEST 🧠";
    }

    function setCat(c, el) {
        cat = c;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        
        translateUI();
        if (cat === 'test') buildTestPool();
        
        resetCard();
        renderButtons();
        nextW();
    }

    function showAnswer() {
        document.getElementById('w-tr').style.display = 'block';
        document.getElementById('w-pron').style.display = 'block';
    }

    function resetCard() {
        document.getElementById('w-tr').style.display = 'none';
        document.getElementById('w-pron').style.display = 'none';
    }

    function cardClick() {
        showAnswer();
        if(!isMuted) speakCurrentWord();
    }

    function toggleMute(event) {
        if (event) event.stopPropagation();
        isMuted = !isMuted;
        localStorage.setItem('pwa_muted', isMuted);
        document.getElementById('audio-btn').innerText = isMuted ? "🔇" : "🔊";
        if (!isMuted) speakCurrentWord();
    }

    function speakCurrentWord(event) {
        if (event) event.stopPropagation();
        if (isMuted) return;
        const wordText = document.getElementById('w-en').innerText;
        if (wordText === uiLang[currentLang].bitti || wordText === "-" || wordText.includes("!")) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(wordText);
        utterance.lang = 'en-US';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    function buildTestPool() {
        currentTestData = [];
        ['giris', 'orta', 'ileri', 'teknik'].forEach(c => {
            lrn[c].forEach(wordEn => {
                const found = db[c].find(x => x.en === wordEn);
                if (found) currentTestData.push({ ...found, originalCat: c });
            });
        });
    }

    function nextW() {
        resetCard();
        updateStats();
        const ui = uiLang[currentLang];
        
        if (cat === 'test') {
            if (currentTestData.length === 0) {
                document.getElementById('w-en').innerText = ui.noWord;
                document.getElementById('w-lvl').innerText = "-";
                idx = -1;
                return;
            }
            const w = currentTestData[Math.floor(Math.random() * currentTestData.length)];
            idx = currentTestData.indexOf(w);
            
            document.getElementById('w-en').innerText = w.en;
            document.getElementById('w-lvl').innerText = `Test: ${w.lvl}`;
            document.getElementById('w-tr').innerText = w[currentLang];
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        } else {
            const avail = db[cat].filter(w => !lrn[cat].includes(w.en));
            if (avail.length === 0) {
                document.getElementById('w-en').innerText = ui.bitti;
                document.getElementById('w-lvl').innerText = "-";
                idx = -1;
                return;
            }
            const w = avail[Math.floor(Math.random() * avail.length)];
            idx = db[cat].findIndex(x => x.en === w.en);
            
            document.getElementById('w-en').innerText = w.en;
            document.getElementById('w-lvl').innerText = w.lvl;
            document.getElementById('w-tr').innerText = w[currentLang];
            document.getElementById('w-pron').innerText = `[${w.pron}]`;
        }

        setTimeout(speakCurrentWord, 100);
    }

    function markLrn() {
        if (idx === -1 || cat === 'test') return;
        const w = db[cat][idx].en;
        if (!lrn[cat].includes(w)) {
            lrn[cat].push(w);
            localStorage.setItem('pwa_lrn_v5', JSON.stringify(lrn));
        }
        nextW();
    }

    function testWrong() {
        if (idx === -1 || cat !== 'test') return;
        const w = currentTestData[idx];
        lrn[w.originalCat] = lrn[w.originalCat].filter(x => x !== w.en);
        localStorage.setItem('pwa_lrn_v5', JSON.stringify(lrn));
        currentTestData.splice(idx, 1);
        nextW();
    }

    function testRight() {
        if (idx === -1 || cat !== 'test') return;
        currentTestData.splice(idx, 1);
        nextW();
    }

    function renderButtons() {
        const panel = document.getElementById('action-buttons');
        const ui = uiLang[currentLang];
        if (cat === 'test') {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">${ui.show}</button>
                <button class="btn btn-wrong" onclick="testWrong()">${ui.wrong}</button>
                <button class="btn btn-keep" onclick="testRight()">${ui.keep}</button>
            `;
        } else {
            panel.innerHTML = `
                <button class="btn btn-show" onclick="showAnswer()">${ui.show}</button>
                <button class="btn btn-ok" onclick="markLrn()">${ui.ok}</button>
                <button class="btn btn-next" onclick="nextW()">${ui.next}</button>
            `;
        }
    }

    function updateStats() {
        if (cat === 'test') {
            document.getElementById('s-tot').innerText = "Test";
            document.getElementById('s-lrn').innerText = currentTestData.length;
            document.getElementById('s-rem').innerText = "0";
        } else {
            document.getElementById('s-tot').innerText = db[cat].length;
            document.getElementById('s-lrn').innerText = lrn[cat].length;
            document.getElementById('s-rem').innerText = db[cat].length - lrn[cat].length;
        }
    }

    function resetProgress() {
        if(confirm("Reset?")) {
            if (cat === 'test') {
                lrn = {giris:[],orta:[],ileri:[],teknik:[]};
                currentTestData = [];
            } else {
                lrn[cat] = [];
            }
            localStorage.setItem('pwa_lrn_v5', JSON.stringify(lrn));
            if(cat === 'test') buildTestPool();
            nextW();
        }
    }

    // 🤖 ANDROID SYSTEM IMMERSIVE CONTROL & FULL SCREEN AUTO-REQUEST
    if ('serviceWorker' in navigator) {
        const swCode = "self.addEventListener('fetch', function(e){});";
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    // Android cihazlarda ekrana ilk dokunuşta barları gizleme tetikleyicisi
    document.addEventListener('click', () => {
        if (document.documentElement.requestFullscreen && !document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }, { once: true });

    // Başlangıç Ayarları
    changeLanguage(currentLang);
</script>
</body>
</html>
