            justify-content: space-around;

        .tab-btn.active { background: #38bdf8; color: #0f172a; }

        .card-box {

            border-radius: 20px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-bottom: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }
        .word-title { font-size: 34px; font-weight: bold; margin: 0; color: #fff; word-break: break-word; }
        .word-sub { font-size: 20px; color: #38bdf8; margin: 12px 0 0 0; display: none; font-weight: 600; }
        .word-pron { font-size: 14px; color: #94a3b8; margin: 5px 0 0 0; font-style: italic; display: none; }
        .badge { font-size: 11px; background: rgba(56, 189, 248, 0.1); padding: 4px 10px; border-radius: 12px; margin-top: 12px; color: #38bdf8; font-weight: 600; }
        
        /* Hoparlör Butonu Stili */
        .audio-icon {
            position: absolute; top: 15px; right: 20px; font-size: 20px; color: #94a3b8;
            background: rgba(255,255,255,0.05); padding: 8px; border-radius: 50%; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .controls { display: flex; gap: 12px; width: 100%; }
        .btn {
            flex: 1; padding: 16px 10px; border: none; border-radius: 14px;
            font-size: 15px; font-weight: bold; cursor: pointer; color: white;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-show { background: #475569; }
        .btn-ok { background: #10b981; }
        .btn-next { background: #38bdf8; color: #0f172a; }

<body>

<div class="container">
    <h1>Kelime İstasyonu</h1>
    
    <div class="stats">
        <div>Havuz<span id="s-tot">0</span></div>
        <div>Öğrenilen<span id="s-lrn">0</span></div>
        <div>Kalan<span id="s-rem">0</span></div>
        <button class="reset-btn" onclick="resetProgress()">Sıfırla</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setCat('giris', this)">GİRİŞ</button>
        <button class="tab-btn" onclick="setCat('orta', this)">ORTA</button>
        <button class="tab-btn" onclick="setCat('ileri', this)">İLERİ</button>
        <button class="tab-btn" onclick="setCat('teknik', this)">TEKNİK</button>
    </div>

    <div class="card-box" onclick="cardClick()">
        <div class="audio-icon" onclick="speakCurrentWord(event)">🔊</div>
        <div class="word-title" id="w-en">-</div>
        <div class="badge" id="w-lvl">-</div>
        <div class="word-sub" id="w-tr">-</div>
        <div class="word-pron" id="w-pron">-</div>
    </div>

    <div class="controls">
        <button class="btn btn-show" onclick="showAnswer()">Anlamı</button>
        <button class="btn btn-ok" onclick="markLrn()">✔ Bildim</button>
        <button class="btn btn-next" onclick="nextW()">Sonraki ➔</button>

    function setCat(c, el) {
        cat = c;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        resetCard();
        nextW();
    }

    function showAnswer() {
        document.getElementById('w-tr').style.display = 'block';
        document.getElementById('w-pron').style.display = 'block';
    }

    function resetCard() {
        document.getElementById('w-tr').style.display = 'none';
        document.getElementById('w-pron').style.display = 'none';
    }

    function cardClick() {
        showAnswer();
        speakCurrentWord();
    }

    // 🔊 SESLENDİRME FONKSİYONU (APPLE US ENGLISH VOICE)
    function speakCurrentWord(event) {
        if (event) event.stopPropagation(); // Butona tıklanınca kart tıklamasını engelle
        
        const wordText = document.getElementById('w-en').innerText;
        if (wordText === "Bitti! 🎉" || wordText === "-") return;

        // Devam eden konuşma varsa sustur
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(wordText);
        utterance.lang = 'en-US'; // Amerikan İngilizcesi
        utterance.rate = 0.85;    // Anlaşılır olması için hızı hafifçe yavaşlattım (Normali 1.0)
        
        window.speechSynthesis.speak(utterance);
    }

    function nextW() {
        resetCard();
        const avail = db[cat].filter(w => !lrn[cat].includes(w.en));
        updateStats();
        
        if (avail.length === 0) {
            document.getElementById('w-en').innerText = "Bitti! 🎉";
            document.getElementById('w-lvl').innerText = "-";
            idx = -1;
            return;
        }
        
        const w = avail[Math.floor(Math.random() * avail.length)];
        idx = db[cat].findIndex(x => x.en === w.en);
        
        document.getElementById('w-en').innerText = w.en;
        document.getElementById('w-lvl').innerText = w.lvl;
        document.getElementById('w-tr').innerText = w.tr;
        document.getElementById('w-pron').innerText = `[${w.pron}]`;

        // Yeni kelime geldiğinde otomatik seslendir (iOS kuralı gereği kullanıcı etkileşimiyle tetiklenir)
        setTimeout(speakCurrentWord, 100);
    }

    function markLrn() {
        if (idx === -1) return;
        const w = db[cat][idx].en;
        if (!lrn[cat].includes(w)) {
            lrn[cat].push(w);
            localStorage.setItem('pwa_lrn_v4', JSON.stringify(lrn));
        }
        nextW();
    }

    function updateStats() {
        document.getElementById('s-tot').innerText = db[cat].length;
        document.getElementById('s-lrn').innerText = lrn[cat].length;
        document.getElementById('s-rem').innerText = db[cat].length - lrn[cat].length;
    }

    function resetProgress() {
        if(confirm("Bu kategorideki ilerlemeni sıfırlamak istiyor musun?")) {
            lrn[cat] = [];
            localStorage.setItem('pwa_lrn_v4', JSON.stringify(lrn));
            nextW();
        }
    }

    if ('serviceWorker' in navigator) {
        const swCode = "self.addEventListener('fetch', function(e){});";
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }

    updateStats(); nextW();
</script>
